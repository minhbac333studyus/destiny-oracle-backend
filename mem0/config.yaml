# mem0/config.yaml
# LLM: Claude Haiku (fast, ~$0.002/message for Mem0 internal calls)
# Embedder: Ollama nomic-embed-text (free, local)
llm:
  provider: "anthropic"
  config:
    model: "claude-haiku-4-5-20251001"
    temperature: 0.2

embedder:
  provider: "ollama"
  config:
    model: "nomic-embed-text"
    ollama_base_url: "http://ollama:11434"

vector_store:
  provider: "pgvector"
  config:
    host: "mem0-pgvector"
    port: 5432
    user: "postgres"
    password: "${MEM0_POSTGRES_PASSWORD}"
    dbname: "postgres"

graph_store:
  provider: "neo4j"
  config:
    url: "bolt://mem0-neo4j:7687"
    username: "neo4j"
    password: "${MEM0_NEO4J_PASSWORD}"
