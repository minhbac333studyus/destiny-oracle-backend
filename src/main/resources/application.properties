# Application 
spring.application.name=destiny-oracle-backend

# Datasource 
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/destiny_oracle}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000

# Servlet 
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JPA / Hibernate 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Spring AI  Claude (image prompts + stage content) 
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:disabled}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.max-tokens=20000

# Spring AI  Ollama (chat, compression, insights  $0 cost) 
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_CHAT_MODEL:qwen3:8b}
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.num-predict=4096

# Logging 
logging.file.path=${LOG_PATH:logs}
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.com.destinyoracle=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=WARN

# Server 
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never

# Springdoc / Swagger 
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Actuator 
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Mem0 long-term memory sidecar
mem0.base-url=${MEM0_BASE_URL:http://localhost:8888}

#   Push notifications (Phase 3) 
push.apns.key-path=${PUSH_APNS_KEY_PATH:}
push.apns.team-id=${PUSH_APNS_TEAM_ID:}
push.apns.key-id=${PUSH_APNS_KEY_ID:}
push.apns.topic=${PUSH_APNS_TOPIC:com.yourapp.destinyoracle}
push.apns.production=${PUSH_APNS_PRODUCTION:false}
push.web.public-key=${PUSH_WEB_PUBLIC_KEY:}
push.web.private-key=${PUSH_WEB_PRIVATE_KEY:}
push.web.subject=${PUSH_WEB_SUBJECT:mailto:admin@destinyoracle.app}

#  App config (Image generation, GCS, CORS, default user) 
app.image-provider=${IMAGE_PROVIDER:modelslab}
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=gemini-2.5-flash-image
app.modelslab.api-key=${MODELSLAB_API_KEY:}
app.modelslab.model-id=${MODELSLAB_MODEL:qwen}
app.modelslab.base-url=${MODELSLAB_URL:https://modelslab.com/api/v6/images/text2img}
app.modelslab.width=576
app.modelslab.height=1024
app.gcs.bucket=${GCS_BUCKET:destiny-oracle-assets}
app.default-user-id=${DEFAULT_USER_ID:00000000-0000-0000-0000-000000000001}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}
